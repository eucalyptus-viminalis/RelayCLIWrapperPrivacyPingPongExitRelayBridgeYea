<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200">
  <title>Relay CLI — Social Preview</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --safe: 48px;
      --bg: #06080d;
      --text: #f0ece4;
      --accent: #c4a05a;
      --accent-soft: rgba(196, 160, 90, 0.07);
      --muted: rgba(240, 236, 228, 0.45);
      --line: rgba(196, 160, 90, 0.18);
    }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      position: relative;
    }

    /* ── Background atmosphere ─────────────────────────────── */

    .bg-effects {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    /* Primary warm glow — lower center */
    .glow-warm {
      position: absolute;
      width: 1000px;
      height: 600px;
      bottom: -120px;
      left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(
        ellipse 50% 55%,
        rgba(196, 155, 80, 0.10) 0%,
        rgba(196, 155, 80, 0.04) 40%,
        transparent 70%
      );
    }

    /* Secondary cool glow — upper left for depth */
    .glow-cool {
      position: absolute;
      width: 700px;
      height: 500px;
      top: -100px;
      left: -100px;
      background: radial-gradient(
        ellipse,
        rgba(100, 120, 180, 0.04) 0%,
        transparent 65%
      );
    }

    /* Tertiary accent glow — right side warmth */
    .glow-right {
      position: absolute;
      width: 500px;
      height: 400px;
      top: 50%;
      right: -80px;
      transform: translateY(-50%);
      background: radial-gradient(
        ellipse,
        rgba(196, 140, 70, 0.05) 0%,
        transparent 65%
      );
    }

    /* Subtle dot grid */
    .dot-grid {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(240, 236, 228, 0.025) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Faint horizontal rule across the canvas */
    .horizon {
      position: absolute;
      width: 100%;
      height: 1px;
      top: 62%;
      background: linear-gradient(
        90deg,
        transparent 5%,
        rgba(196, 160, 90, 0.08) 30%,
        rgba(196, 160, 90, 0.12) 50%,
        rgba(196, 160, 90, 0.08) 70%,
        transparent 95%
      );
    }

    /* ── Safe-area content wrapper ─────────────────────────── */

    .safe {
      position: absolute;
      inset: 0;
      padding: var(--safe);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 1;
    }

    /* ── Bridge icon ──────────────────────────────────────── */

    .icon-bridge {
      margin-bottom: 36px;
      opacity: 0.7;
    }

    .icon-bridge svg {
      filter: drop-shadow(0 0 20px rgba(196, 160, 90, 0.15));
    }

    /* ── Typography ────────────────────────────────────────── */

    .headline {
      font-size: 82px;
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 16px;
    }

    .headline em {
      font-style: normal;
      color: var(--accent);
    }

    /* Decorative separator */
    .sep {
      width: 48px;
      height: 1px;
      background: var(--line);
      margin: 20px 0;
    }

    .subtitle {
      font-size: 28px;
      font-weight: 400;
      line-height: 1.3;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    /* Project name at bottom */
    .project-name {
      position: absolute;
      bottom: var(--safe);
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Menlo, Consolas, monospace;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(196, 160, 90, 0.3);
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Background atmosphere -->
  <div class="bg-effects">
    <div class="glow-warm"></div>
    <div class="glow-cool"></div>
    <div class="glow-right"></div>
    <div class="dot-grid"></div>
    <div class="horizon"></div>
  </div>

  <!-- Main content -->
  <div class="safe">

    <!-- Abstract bridge/relay icon — two nodes connected by an arc -->
    <div class="icon-bridge">
      <svg width="100" height="44" viewBox="0 0 100 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Arc connecting two nodes -->
        <path d="M16 32 Q50 -8 84 32" stroke="rgba(196, 160, 90, 0.35)" stroke-width="1.5" fill="none" />
        <path d="M20 30 Q50 0 80 30" stroke="rgba(196, 160, 90, 0.5)" stroke-width="1" fill="none" />
        <!-- Left node -->
        <circle cx="14" cy="32" r="5" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity="0.6" />
        <circle cx="14" cy="32" r="2" fill="var(--accent)" opacity="0.5" />
        <!-- Right node -->
        <circle cx="86" cy="32" r="5" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity="0.6" />
        <circle cx="86" cy="32" r="2" fill="var(--accent)" opacity="0.5" />
        <!-- Center dot — the relay -->
        <circle cx="50" cy="6" r="3" fill="var(--accent)" opacity="0.3" />
      </svg>
    </div>

    <h1 class="headline">Bridge in <em>silence</em>.</h1>
    <div class="sep"></div>
    <p class="subtitle">Privacy-first cross-chain CLI</p>
  </div>

  <!-- Project identifier -->
  <div class="project-name">relay</div>

</body>
</html>
